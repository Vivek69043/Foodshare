<!DOCTYPE html>
<html>
<head>
    <title>Login - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text -white d-flex align-items-center" style="height: 100vh;">
<div class="container py-5" style="max-width: 400px;">

    <h2 class="text-center mb-4">Login</h2>

    <form method="POST" class="card p-4 shadow">

        <label class="form-label">Login As</label>
        <select class="form-select mb-3" name="role" required>
            <option value="donor">Donor</option>
            <option value="ngo">NGO</option>
        </select>

        <label class="form-label">Username</label>
        <input class="form-control mb-3" name="username" required>

        <label class="form-label">Password</label>
        <input type="password" class="form-control mb-3" name="password" required>

        <button class="btn btn-primary w-100">Login</button>

        <p class="mt-3 text-center small text-muted">
            Default donor login: donor / 123 <br>
            Default NGO login: ngo / 123
        </p>

    </form>

</div>
</body>
</html>

<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Create Food Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
    <a href="{{ url_for('index') }}">&larr; Back</a>
    <h2 class="mt-3">Create Food Post</h2>

    <form method="POST" enctype="multipart/form-data" class="mt-4">

        <label class="form-label">Food Image</label>
        <input type="file" class="form-control" name="image"><br>

        <label class="form-label">Food Type</label>
        <select class="form-select" name="food_type" required>
            <option>Veg</option>
            <option>Non-Veg</option>
            <option>Snacks</option>
            <option>Bakery</option>
            <option>Other</option>
        </select><br>

        <label class="form-label">Dish Name</label>
        <input class="form-control" name="dish_name" placeholder="Butter Paneer, Rajma Chawal" required><br>

        <label class="form-label">Quantity</label>
        <input class="form-control" name="quantity" required><br>

        <label class="form-label">Location</label>
        <input class="form-control" name="location" required><br>

        <label class="form-label">Pickup Time</label>
        <input class="form-control" name="pickup_time" required><br>

        <label class="form-label">Notes</label>
        <textarea class="form-control" name="notes"></textarea><br>

        <button class="btn btn-primary">Create Post</button>
    </form>
</body>
</html>
